<!DOCTYPE html>
<!DOCTYPE html>
<html>
<head>
  <title>Reportes</title>
</head>
<body>

<h1>Reportes de Accidentes</h1>
<ul id="lista"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔴 TU CONFIGURACIÓN (YA CORRECTA)
const firebaseConfig = {
  apiKey: "AIzaSyAL7n_6pBJaOsF9f4aFlReu9CBTw0HcYOw",
  authDomain: "revista-motos.firebaseapp.com",
  projectId: "revista-motos",
  storageBucket: "revista-motos.firebasestorage.app",
  messagingSenderId: "554552666157",
  appId: "1:554552666157:web:5ca3ad332829931436f0a4",
  measurementId: "G-FR9LC1BCGB"
};

// 🔥 INICIALIZAR FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 OBTENER LISTA HTML
const lista = document.getElementById("lista");

// 🔥 CONSULTAR COLECCIÓN (RESPETA MAYÚSCULA)
const querySnapshot = await getDocs(collection(db, "Reportes"));

// 🔥 RECORRER DATOS
querySnapshot.forEach((doc) => {
  const data = doc.data();

  const li = document.createElement("li");

  // 💥 FORMATO BONITO
  li.innerHTML = `
    <strong>Edad:</strong> ${data.Edad} <br>
    <strong>Usa casco:</strong> ${data.Usa_Casco} <br>
    <strong>Exceso de velocidad:</strong> ${data.Exceso_Velocidad} <br>
    <strong>Tipo de incidente:</strong> ${data.Tipo_Incidente} <br>
    <strong>Lesiones:</strong> ${data.Lesiones} <br>
    <strong>Ubicación:</strong> ${data.Ubicación}
    <hr>
  `;

  lista.appendChild(li);
});

</script>

</body>
</html>
